<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <title>Japan in Seasons — Cherry Blossom, Koyo, Fruit Picking & Festivals</title>
  <meta name="description" content="Seasonal activities in Japan — cherry blossom, autumn leaves, fruit picking, wisteria, hydrangea, fireworks & more. 1,700+ spots with live data.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<div class="app">
  <div class="top-bar">
    <h1>Japan in Seasons</h1>
    <div class="controls">
      <button class="mode-btn" id="btn-sakura" onclick="setMode('sakura')" aria-label="Cherry Blossom mode">Cherry Blossom</button>
      <button class="mode-btn koyo" id="btn-koyo" onclick="setMode('koyo')" aria-label="Autumn Leaves mode">Autumn Leaves</button>
      <button class="mode-btn fruit" id="btn-fruit" onclick="setMode('fruit')" aria-label="Fruit Picking mode">Fruit Picking</button>
      <button class="mode-btn flowers" id="btn-flowers" onclick="setMode('flowers')" aria-label="Flowers mode">🌷 Flowers</button>
      <button class="mode-btn whatson" id="btn-whatson" onclick="setMode('whatson')" aria-label="What's On mode">📅 What's On</button>
      <button class="mode-btn" id="btn-trip" onclick="setMode('trip')" aria-label="Plan My Trip">Plan My Trip</button>
      <button class="mode-btn" onclick="findNearMe()" id="btn-nearme" title="Find sakura spots near your current location" aria-label="Find sakura spots near my location">Near Me</button>
    </div>
    <select class="mode-select" id="mode-select" onchange="handleModeSelect(this.value)" aria-label="Select mode">
      <option value="sakura">🌸 Cherry Blossom</option>
      <option value="koyo">🍁 Autumn Leaves</option>
      <option value="fruit">🍓 Fruit Picking</option>
      <option value="flowers">🌷 Flowers</option>
      <option value="whatson">📅 What's On</option>
      <option value="trip">🗓️ Plan My Trip</option>
      <option value="nearme">📍 Near Me</option>
    </select>
  </div>

  <div class="main">
    <div class="map-container">
      <div id="map"></div>
      <div class="map-placeholder hidden" id="map-placeholder" aria-live="polite"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header" id="sidebar-header">
        <h2>Loading...</h2>
        <p>Select a region on the map or browse below</p>
      </div>
      <div style="padding:8px 16px;border-bottom:1px solid var(--gray-200)">
        <label for="search-box" class="sr-only">Search city or spot name</label>
        <input type="text" id="search-box" placeholder="Search city or spot name..."
          oninput="filterSidebar(this.value)"
          style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:0.85rem">
      </div>
      <div id="bloom-filters" style="display:none;padding:8px 12px;border-bottom:1px solid var(--gray-200);gap:4px;">
        <button class="filter-pill active" data-filter="all" onclick="applyBloomFilter('all',this)">All</button>
        <button class="filter-pill" data-filter="buds" onclick="applyBloomFilter('buds',this)">🌰 Budding</button>
        <button class="filter-pill" data-filter="blooming" onclick="applyBloomFilter('blooming',this)">🌸 Blooming</button>
        <button class="filter-pill" data-filter="peak" onclick="applyBloomFilter('peak',this)">🌺 Full Bloom</button>
        <button class="filter-pill" data-filter="ended" onclick="applyBloomFilter('ended',this)">🍃 Past Peak</button>
      </div>
      <div class="sidebar-content" id="sidebar-content" role="status" aria-live="polite">
        <div class="loading">Loading forecast data...</div>
      </div>
      <div class="footer-link">
        <span id="footer-data-note"></span>
        MCP: <code>seasons.kooexperience.com/mcp</code> &middot;
        <a href="https://github.com/haomingkoo/japan-seasons-mcp" target="_blank" rel="noopener">GitHub</a> &middot;
        <a href="https://www.npmjs.com/package/japan-seasons-mcp" target="_blank" rel="noopener">npm</a><br>
        Built by <a href="https://kooexperience.com" target="_blank" rel="noopener">Haoming Koo</a>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
