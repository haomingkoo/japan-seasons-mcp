<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <title>Japan Sakura & Koyo Forecast — Cherry Blossom & Autumn Leaves</title>
  <meta name="description" content="Real-time cherry blossom and autumn leaves forecast for Japan. 1,700+ spots with live bloom data on an interactive map.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ec4899; --pink-light: #fdf2f8; --pink-dark: #be185d;
      --orange: #ea580c; --orange-light: #fff7ed;
      --green: #059669; --green-light: #ecfdf5;
      --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e5e5e5;
      --gray-400: #a3a3a3; --gray-600: #525252; --gray-800: #262626;
      --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--gray-800); background: var(--gray-50); }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: white; border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0; gap: 12px; flex-wrap: wrap;
    }
    .top-bar h1 { font-size: 1.15rem; font-weight: 700; white-space: nowrap; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .sidebar {
      width: 380px; overflow-y: auto; background: white;
      border-left: 1px solid var(--gray-200); flex-shrink: 0;
    }

    /* ── Controls ── */
    .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .mode-btn {
      padding: 6px 14px; border: 1px solid var(--gray-200); border-radius: 20px;
      background: white; cursor: pointer; font-size: 0.82rem; font-weight: 500;
      color: var(--gray-600); transition: all 0.2s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .mode-btn.koyo.active { background: var(--orange); color: white; border-color: var(--orange); }
    .mode-btn.fruit.active { background: #16a34a; color: white; border-color: #16a34a; }
    .mode-btn:hover:not(.active) { border-color: var(--gray-400); }
    .date-input {
      padding: 5px 10px; border: 1px solid var(--gray-200); border-radius: 8px;
      font-size: 0.82rem; background: white;
    }
    .find-btn {
      padding: 5px 14px; background: var(--pink); color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 500;
    }

    /* ── Sidebar content ── */
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .sidebar-header h2 { font-size: 1rem; margin-bottom: 2px; }
    .sidebar-header p { font-size: 0.8rem; color: var(--gray-600); }
    .sidebar-content { padding: 0; }

    .spot-item {
      padding: 12px 16px; border-bottom: 1px solid var(--gray-100);
      cursor: pointer; transition: background 0.15s;
    }
    .spot-item:hover { background: var(--gray-50); }
    .spot-item h4 { font-size: 0.88rem; margin-bottom: 3px; }
    .spot-item .sub { font-size: 0.78rem; color: var(--gray-600); }

    /* ── Bloom bar ── */
    .bloom-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .bloom-label { font-size: 0.72rem; color: var(--gray-400); width: 68px; }
    .bloom-track { flex: 1; height: 14px; background: var(--gray-100); border-radius: 7px; overflow: hidden; }
    .bloom-fill {
      height: 100%; border-radius: 7px; display: flex; align-items: center;
      justify-content: flex-end; padding-right: 4px;
      font-size: 0.65rem; font-weight: 600; color: white; min-width: 24px;
    }
    .bloom-fill.b { background: linear-gradient(90deg, #fdba74, #f97316); }
    .bloom-fill.f { background: linear-gradient(90deg, #f9a8d4, #be185d); }

    /* ── Badge ── */
    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 0.7rem; font-weight: 500;
    }
    .badge.peak { background: #fce7f3; color: #be185d; }
    .badge.bloom { background: #fdf2f8; color: #ec4899; }
    .badge.soon { background: #ecfdf5; color: #059669; }
    .badge.ended { background: var(--gray-100); color: var(--gray-400); }

    /* ── Legend ── */
    .legend {
      position: absolute; bottom: 20px; left: 20px; z-index: 1000;
      background: white; padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 0.75rem;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    /* ── Loading ── */
    .loading { padding: 40px; text-align: center; color: var(--gray-400); }

    /* ── Bloom filter pills ── */
    .filter-pill {
      flex: 1; padding: 5px 4px; border: 1px solid var(--gray-200); border-radius: 6px;
      background: white; cursor: pointer; font-size: 0.75rem; color: var(--gray-600);
      white-space: nowrap; transition: all 0.15s; text-align: center; font-weight: 500;
    }
    .filter-pill.active { background: var(--pink); color: white; border-color: var(--pink); }
    .filter-pill:hover:not(.active) { background: var(--gray-50); border-color: var(--gray-400); }

    /* ── Footer link ── */
    .footer-link {
      padding: 16px; text-align: center; font-size: 0.75rem; color: var(--gray-400);
      border-top: 1px solid var(--gray-200);
    }
    .footer-link a { color: var(--gray-600); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .map-container { height: 50vh; }
      .sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid var(--gray-200); }
      .top-bar h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <h1>Japan Sakura & Koyo</h1>
    <div class="controls">
      <button class="mode-btn active" id="btn-sakura" onclick="setMode('sakura')">Cherry Blossom</button>
      <button class="mode-btn koyo" id="btn-koyo" onclick="setMode('koyo')">Autumn Leaves</button>
      <button class="mode-btn fruit" id="btn-fruit" onclick="setMode('fruit')">Fruit Picking</button>
      <button class="mode-btn" id="btn-trip" onclick="setMode('trip')">Plan My Trip</button>
      <button class="mode-btn" onclick="findNearMe()" id="btn-nearme" title="Find sakura spots near your current location">Near Me</button>
      <span style="color:var(--gray-200)">|</span>
      <input type="date" class="date-input" id="date-start">
      <span style="font-size:0.8rem;color:var(--gray-400)">to</span>
      <input type="date" class="date-input" id="date-end">
      <button class="find-btn" onclick="findBestDates()">Find</button>
    </div>
  </div>

  <div class="main">
    <div class="map-container">
      <div id="map"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header" id="sidebar-header">
        <h2>Loading...</h2>
        <p>Select a region on the map or browse below</p>
      </div>
      <div style="padding:8px 16px;border-bottom:1px solid var(--gray-200)">
        <input type="text" id="search-box" placeholder="Search city or spot name..."
          oninput="filterSidebar(this.value)"
          style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:0.85rem">
      </div>
      <div id="bloom-filters" style="display:none;padding:8px 12px;border-bottom:1px solid var(--gray-200);gap:4px;">
        <button class="filter-pill active" onclick="applyBloomFilter('all',this)">All</button>
        <button class="filter-pill" onclick="applyBloomFilter('peak',this)">🌺 Full Bloom</button>
        <button class="filter-pill" onclick="applyBloomFilter('blooming',this)">🌸 Blooming</button>
        <button class="filter-pill" onclick="applyBloomFilter('buds',this)">🌱 Budding</button>
        <button class="filter-pill" onclick="applyBloomFilter('ended',this)">🍃 Past Peak</button>
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <div class="loading">Loading forecast data...</div>
      </div>
      <div class="footer-link">
        Data: <a href="https://n-kishou.com">Japan Meteorological Corp</a> &middot;
        Forecasts update Thursdays &middot; Bloom meters update daily 9AM JST<br>
        MCP: <code>sakura.kooexperience.com/mcp</code> &middot;
        <a href="https://github.com/haomingkoo/japan-sakura-koyo-mcp">GitHub</a> &middot;
        <a href="https://www.npmjs.com/package/japan-sakura-koyo-mcp">npm</a>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let mode = 'sakura';
let sakuraData = null;
let allSpotsData = null;
let mapInstance = null;
let markers = [];
let clusterGroup = null;

// ── Map setup ──
function initMap() {
  mapInstance = L.map('map', { zoomControl: false }).setView([36.5, 137.5], 6);
  L.control.zoom({ position: 'topright' }).addTo(mapInstance);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 18,
  }).addTo(mapInstance);

  // Lazy-load weather when a spot popup opens
  mapInstance.on('popupopen', async (e) => {
    const el = e.popup.getElement()?.querySelector('.popup-weather');
    if (!el) return;
    const lat = parseFloat(el.dataset.lat);
    const lon = parseFloat(el.dataset.lon);
    if (!lat || !lon) { el.textContent = ''; return; }

    // Find nearest known city
    let minDist = Infinity, nearestCity = null;
    for (const [city, coords] of Object.entries(TOURIST_CITIES)) {
      const d = haversineKm(lat, lon, coords[0], coords[1]);
      if (d < minDist) { minDist = d; nearestCity = city; }
    }
    if (!nearestCity || minDist > 120) { el.textContent = ''; return; }

    try {
      const cityName = nearestCity.charAt(0).toUpperCase() + nearestCity.slice(1);
      const data = await api(`/api/weather?city=${encodeURIComponent(cityName)}`);
      const days = (data.forecasts || []).slice(0, 3);
      if (!days.length) { el.textContent = ''; return; }
      const weatherLink = `https://www.google.com/search?q=weather+${encodeURIComponent(cityName)}+Japan`;
      const cols = days.map(day => {
        const maxC = day.temperature?.max?.celsius;
        const rain = day.chanceOfRain || {};
        const rainHigh = Math.max(...Object.values(rain).map(v => parseInt(v) || 0));
        const icon = rainHigh >= 50 ? '🌧' : rainHigh >= 20 ? '🌦' : '☀️';
        const dateLabel = (day.date || '').slice(5);
        const rainStr = rainHigh > 0 ? `<span style="color:#60a5fa">${rainHigh}%</span>` : '';
        return `<div style="text-align:center;flex:1">
          <div style="font-size:16px">${icon}</div>
          <div style="font-weight:600">${maxC ? maxC+'°' : '—'}</div>
          <div style="color:#999">${dateLabel}</div>
          ${rainStr ? `<div>${rainStr}</div>` : ''}
        </div>`;
      }).join('');
      el.innerHTML = `
        <div style="display:flex;gap:4px;margin-bottom:5px">${cols}</div>
        <a href="${weatherLink}" target="_blank" style="font-size:10px;color:#94a3b8">
          Near ${cityName} · More weather →
        </a>`;
    } catch { el.textContent = ''; }
  });
}

// ── Helpers ──
const $ = id => document.getElementById(id);
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`Error: ${r.status}`);
  return r.json();
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function daysSince(iso) {
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
// Sanity-check sakura dates: bloom happens Jan–Jun or Oct–Dec at the latest (Hokkaido).
// A date in Jul–Sep is always stale/bad API data.
function sakuraDateOk(iso) {
  if (!iso) return false;
  const mo = new Date(iso).getMonth() + 1;
  return mo < 7 || mo > 9; // Jun is ok (late Hokkaido), Jul–Sep are never sakura
}
// Full date line: confirmed = plain date, forecast = "(est.)" suffix
function fmtDates(bloomForecast, bloomRate, fullBloomForecast, fullRate) {
  const bDate = sakuraDateOk(bloomForecast) ? fmtDate(bloomForecast) : '—';
  const fDate = sakuraDateOk(fullBloomForecast) ? fmtDate(fullBloomForecast) : '—';
  const b = bloomRate >= 100 ? `Bloomed: ${bDate}` : `Bloom: ${bDate === '—' ? '—' : bDate + ' (est.)'}`;
  const f = fullRate >= 100 ? `Full bloom: ${fDate}` : `Full bloom: ${fDate === '—' ? '—' : fDate + ' (est.)'}`;
  return `${b} · ${f}`;
}

// ── Color by bloom rate + date ──
// Lifecycle: orange (bud/growth) → pink (flowering) → green (ended/leaves)
// fullRate stays at 100% forever after peak — use forecast date to detect "ended"
function sakuraColor(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100) {
    const daysSinceFull = fullBloomForecast ? daysSince(fullBloomForecast) : 0;
    if (daysSinceFull > 10) return '#4ade80';  // green — ended, leaves out
    if (daysSinceFull > 6) return '#86efac';   // light green — petals falling
    return '#be185d';                           // deep pink — still at peak
  }
  if (fullRate >= 70) return '#ec4899';
  if (fullRate >= 20) return '#f472b6';
  if (fullRate > 0) return '#f9a8d4';
  if (bloomRate >= 85) return '#f97316';
  if (bloomRate >= 60) return '#fb923c';
  if (bloomRate > 0) return '#fdba74';
  return '#d4d4d4';
}

// Spot status text also needs the date check
function spotStatusWithDate(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = daysSince(fullBloomForecast);
    if (days > 10) return 'Ended — green leaves';
    if (days > 6) return 'Falling — petals scattering';
    if (days > 3) return 'Past peak — still some petals';
    return 'Full bloom — best viewing!';
  }
  return null; // use default from growthStage/floweringStage
}

function sakuraRadius(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = daysSince(fullBloomForecast);
    if (days > 6) return 5;  // ended — smaller
  }
  if (fullRate >= 90) return 9;
  if (fullRate > 0) return 7;
  if (bloomRate > 0) return 5;
  return 4;
}

// ── Bloom category (for filter) ──
let bloomFilter = 'all';

function bloomCategory(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = daysSince(fullBloomForecast);
    if (days > 6) return 'ended';
    return 'peak';
  }
  if (fullRate > 0) return 'blooming';
  if (bloomRate > 0) return 'buds';
  return 'dormant';
}

function applyBloomFilter(filter, el) {
  bloomFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

  if (!allSpotsData) return;

  // Rebuild cluster with filter applied
  if (clusterGroup) { mapInstance.removeLayer(clusterGroup); clusterGroup = null; }
  loadAllSpotsOnMap();

  // Update sidebar
  if (filter === 'all') {
    // Restore region/city list
    let html = '';
    for (const region of sakuraData.regions) {
      html += `<div style="padding:12px 16px;background:var(--gray-50);font-weight:600;font-size:0.85rem;border-bottom:1px solid var(--gray-200)">${region.nameEn}</div>`;
      for (const city of region.cities) {
        const st = statusText(city.status);
        html += `<div class="spot-item" onclick="loadPrefSpots('${city.prefCode}', '${city.prefName}')">
          <h4>${city.cityName} <span style="font-weight:400;color:var(--gray-400)">${city.prefName}</span></h4>
          <div class="sub">
            <span class="badge ${st.cls}">${st.text}</span>
            &nbsp; Bloom: ${sakuraDateOk(city.bloom.forecast) ? fmtDate(city.bloom.forecast) : '—'}${city.bloom.observation ? ' → '+fmtDate(city.bloom.observation) : ''}
            &nbsp; Full: ${sakuraDateOk(city.fullBloom.forecast) ? fmtDate(city.fullBloom.forecast) : '—'}${city.fullBloom.observation ? ' → '+fmtDate(city.fullBloom.observation) : ''}
          </div>
        </div>`;
      }
    }
    $('sidebar-content').innerHTML = html;
  } else {
    const labelMap = { peak:'🌺 Full Bloom', blooming:'🌸 Blooming', buds:'🌱 Budding', ended:'🍃 Past Peak' };
    const filtered = allSpotsData.spots.filter(s => bloomCategory(s.bloomRate, s.fullRate, s.fullBloomForecast) === filter);
    const listHtml = filtered.length
      ? filtered.slice(0, 80).map(s => spotCardHtml(s, s.prefecture || '')).join('')
      : '<div class="loading">No spots found for this filter.</div>';
    $('sidebar-content').innerHTML = `<div style="padding:10px 16px;font-size:0.82rem;color:var(--gray-600)">${filtered.length} spots — ${labelMap[filter]}</div>` + listHtml;
  }
}

// Returns human-readable stage name from the bloom/full rates
function growthStage(bloomRate) {
  if (bloomRate >= 100) return 'Bloomed';
  if (bloomRate >= 85) return 'Buds opening';
  if (bloomRate >= 60) return 'Buds swelling';
  if (bloomRate > 0) return 'Bud stage';
  return 'Dormant';
}
function floweringStage(fullRate) {
  if (fullRate >= 100) return 'Full bloom';
  if (fullRate >= 90) return 'Nearly full';
  if (fullRate >= 70) return '70%';
  if (fullRate >= 40) return '50%';
  if (fullRate >= 20) return '30%';
  if (fullRate > 0) return 'Starting';
  return 'Not yet';
}
// Show only the most relevant bar. Hide entirely once past peak (> 3 days after full bloom).
function bloomBar(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = daysSince(fullBloomForecast);
    if (days > 3) return ''; // past peak — no bar, status line says it all
  }
  if (fullRate > 0) {
    return `<div class="bloom-row"><span class="bloom-label">Flowering</span><div class="bloom-track"><div class="bloom-fill f" style="width:${Math.min(fullRate,100)}%">${fullRate}%</div></div><span style="font-size:0.72rem;color:var(--gray-600);width:80px;text-align:right">${floweringStage(fullRate)}</span></div>`;
  }
  return `<div class="bloom-row"><span class="bloom-label">Growth</span><div class="bloom-track"><div class="bloom-fill b" style="width:${Math.min(bloomRate,100)}%">${bloomRate}%</div></div><span style="font-size:0.72rem;color:var(--gray-600);width:80px;text-align:right">${growthStage(bloomRate)}</span></div>`;
}

// Map city status text to dot color/size for the overview map
function statusToColor(status) {
  if (status.includes('Full bloom') || status.includes('best')) return '#be185d';
  if (status.includes('Falling') || status.includes('scattering')) return '#f9a8d4';
  if (status.includes('Blooming') || status.includes('Approaching')) return '#ec4899';
  if (status.includes('Coming') || status.includes('soon')) return '#f97316';
  if (status.includes('Ended')) return '#4ade80';  // green — leaves out
  return '#d4d4d4';
}
function statusToRadius(status) {
  if (status.includes('Full bloom') || status.includes('best')) return 10;
  if (status.includes('Blooming') || status.includes('Falling')) return 8;
  if (status.includes('Coming') || status.includes('soon')) return 6;
  return 5;
}

function statusText(status) {
  if (status.includes('Full bloom') || status.includes('mankai') || status.includes('best')) return { text: status.split('—')[0].trim(), cls: 'peak' };
  if (status.includes('bloom') || status.includes('Bloom') || status.includes('咲き')) return { text: status.split('—')[0].trim(), cls: 'bloom' };
  if (status.includes('Coming') || status.includes('soon') || status.includes('つぼみ') || status.includes('Bud')) return { text: status.split('—')[0].trim(), cls: 'soon' };
  return { text: status.split('—')[0].trim(), cls: 'ended' };
}

// ── City coordinates for map markers (48 JMA observation cities) ──
const CITY_COORDS = {
  "Wakkanai":[45.415,141.673],"Asahikawa":[43.771,142.365],"Abashiri":[44.02,144.273],
  "Kushiro":[42.985,144.381],"Obihiro":[42.92,143.197],"Sapporo":[43.062,141.354],
  "Muroran":[42.315,140.974],"Hakodate":[41.769,140.729],
  "Aomori":[40.824,140.74],"Morioka":[39.702,141.153],"Sendai":[38.268,140.872],
  "Akita":[39.717,140.103],"Yamagata":[38.256,140.339],"Fukushima":[37.75,140.468],
  "Mito":[36.366,140.471],"Utsunomiya":[36.549,139.87],"Maebashi":[36.391,139.061],
  "Kumagaya":[36.147,139.389],"Choshi":[35.735,140.827],"Tokyo":[35.689,139.692],
  "Yokohama":[35.448,139.642],"Kofu":[35.662,138.568],"Nagano":[36.651,138.181],
  "Nagoya":[35.18,136.906],"Gifu":[35.423,136.761],"Shizuoka":[34.976,138.383],"Tsu":[34.73,136.509],
  "Niigata":[37.902,139.024],"Toyama":[36.695,137.211],"Kanazawa":[36.594,136.625],"Fukui":[36.054,136.222],
  "Osaka":[34.694,135.502],"Hikone":[35.276,136.246],"Kyoto":[35.012,135.768],
  "Kobe":[34.691,135.183],"Nara":[34.685,135.833],"Wakayama":[34.226,135.168],

const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fruitSeasonLabel(months, peak) {
  // Find start/end handling wrap-around (e.g. [12,1,2])
  const sorted = [...months].sort((a,b) => a-b);
  const hasWrap = sorted[sorted.length-1] - sorted[0] > 6;
  let start, end;
  if (hasWrap) {
    // wrap-around: find the gap and read the other way
    const wrapStart = sorted.find((m,i) => i>0 && m - sorted[i-1] > 1) ?? sorted[0];
    start = wrapStart; end = sorted[sorted.length-1];
    // e.g. [1,2,3,12] → Dec–Mar
    const before = sorted.filter(m => m >= wrapStart);
    const after = sorted.filter(m => m < wrapStart);
    start = before[0]; end = after[after.length-1];
  } else {
    start = sorted[0]; end = sorted[sorted.length-1];
  }
  const peakLabels = peak.map(m => MO[m-1]).join('–');
  return { season: `${MO[start-1]}–${MO[end-1]}`, peak: peakLabels };
}

function renderFruitMonth(m) {
  fruitSelectedMonth = m;
  const farms = farmDataCache?.spots || [];
  const scrapedAt = farmDataCache?.scraped_at
    ? new Date(farmDataCache.scraped_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    : null;

  // Rebuild map markers for selected month
  clearMarkers();
  let markersAdded = 0;
  if (farms.length) {
    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 50, spiderfyOnMaxZoom: true, showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        const n = cluster.getChildCount();
        const size = Math.min(36 + n * 0.5, 54);
        return L.divIcon({
          html: `<div style="background:#16a34a;color:white;width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2)">${n}</div>`,
          className: '', iconSize: [size, size],
        });
      }
    });
    for (const farm of farms) {
      if (!farm.lat || !farm.lon) continue;
      const seasonFruit = FRUITS.find(f => farm.fruits?.includes(f.name) && f.months.includes(m));
      if (!seasonFruit) continue;
      const marker = L.marker([farm.lat, farm.lon], {
        icon: L.divIcon({
          html: `<div style="background:white;border:2px solid #16a34a;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.2)">${seasonFruit.emoji}</div>`,
          className: '', iconSize: [24, 24], iconAnchor: [12, 12],
        })
      });
      const srcLabel = farm.source === 'jalan' ? 'Jalan' : farm.url?.includes('navitime') ? 'Navitime' : null;
      marker.bindPopup(`<div style="min-width:190px">
        <b>${farm.name}</b><br>
        <span style="font-size:11px;color:#666">${farm.address || ''}</span><br>
        <span style="font-size:11px;color:#555">${(farm.fruits||[]).join(' · ')}</span>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <a href="https://www.google.com/maps/search/?api=1&query=${farm.lat},${farm.lon}" target="_blank" style="color:#ec4899;font-size:12px">Google Maps</a>
          ${farm.url && srcLabel ? `<a href="${farm.url}" target="_blank" style="color:#0369a1;font-size:12px">${srcLabel} →</a>` : ''}
        </div>
      </div>`);
      clusterGroup.addLayer(marker);
      markers.push(marker);
      markersAdded++;
    }
    mapInstance.addLayer(clusterGroup);
  }

  // Month pill selector
  const todayM = new Date().getMonth() + 1;
  const monthPills = MO.map((mo, i) => {
    const mn = i + 1;
    const hasInSeason = FRUITS.some(f => f.months.includes(mn));
    const isActive = mn === m;
    const isToday = mn === todayM;
    return `<button onclick="renderFruitMonth(${mn})" style="
      flex:0 0 auto; padding:4px 8px; border-radius:6px; border:1px solid ${isActive ? '#16a34a' : 'var(--gray-200)'};
      background:${isActive ? '#16a34a' : 'white'}; color:${isActive ? 'white' : hasInSeason ? 'var(--gray-800)' : 'var(--gray-400)'};
      font-size:0.75rem; font-weight:${isActive || isToday ? '600' : '400'}; cursor:pointer;
      ${isToday && !isActive ? 'border-color:#16a34a;color:#16a34a;' : ''}
    ">${mo}</button>`;
  }).join('');

  // Update header
  $('sidebar-header').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <h2 style="margin:0">Fruit Picking in Japan</h2>
      <span style="font-size:0.78rem;color:var(--gray-400)">${markersAdded > 0 ? markersAdded+' farms on map · ' : ''}${farms.length || 0} total</span>
    </div>
    <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none">${monthPills}</div>`;

  // Fruit list for selected month
  const inSeason = FRUITS.filter(f => f.months.includes(m));
  const nextM = m === 12 ? 1 : m + 1;
  const nextM2 = nextM === 12 ? 1 : nextM + 1;
  const comingSoon = FRUITS.filter(f => !f.months.includes(m) && (f.months.includes(nextM) || f.months.includes(nextM2)));
  const other = FRUITS.filter(f => !f.months.includes(m) && !f.months.includes(nextM) && !f.months.includes(nextM2));

  function fruitCard(f) {
    const { season, peak } = fruitSeasonLabel(f.months, f.peak);
    const isPeak = f.peak.includes(m);
    const farmCount = farms.filter(fm => fm.fruits?.includes(f.name)).length;
    return `<div class="spot-item">
      <h4>${f.emoji} ${f.name} <span style="font-weight:400;color:var(--gray-400)">${f.ja}</span>
        ${isPeak ? '<span style="background:#dcfce7;color:#16a34a;font-size:0.72rem;padding:1px 6px;border-radius:10px;margin-left:6px;font-weight:500">Peak</span>' : ''}
      </h4>
      <div class="sub">Season: ${season} · Peak: ${peak}</div>
      <div class="sub" style="margin-top:2px">Best regions: ${f.regions.join(', ')}</div>
      ${farmCount ? `<div class="sub" style="margin-top:2px;color:#16a34a">${farmCount} farms in database</div>` : ''}
      ${f.note ? `<div class="sub" style="margin-top:2px;color:var(--gray-400);font-style:italic">${f.note}</div>` : ''}
    </div>`;
  }

  const isCurrentMonth = m === todayM;
  let html = `<div style="margin:10px 16px;padding:10px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:0.8rem;color:#166534">
    🌱 Season windows are typical regional averages — confirm with farms before visiting.
    ${scrapedAt ? `<br>Farm database: <b>${farmDataCache.total} spots</b> cached on ${scrapedAt}` : ''}
  </div>`;

  if (inSeason.length) {
    html += `<div style="padding:10px 16px;background:#dcfce7;font-weight:600;font-size:0.85rem;color:#15803d;border-bottom:1px solid #bbf7d0">In Season — ${MO[m-1]}${isCurrentMonth ? ' (now)' : ''}</div>`;
    inSeason.forEach(f => html += fruitCard(f));
  }
  if (comingSoon.length) {
    html += `<div style="padding:10px 16px;background:#f0fdf4;font-weight:600;font-size:0.85rem;color:#166534;border-bottom:1px solid var(--gray-200)">Coming Up — ${MO[nextM-1]}/${MO[nextM2-1]}</div>`;
    comingSoon.forEach(f => html += fruitCard(f));
  }
  if (other.length) {
    html += `<div style="padding:10px 16px;background:var(--gray-50);font-weight:600;font-size:0.85rem;color:var(--gray-400);border-bottom:1px solid var(--gray-200)">Other Seasons</div>`;
    other.forEach(f => html += fruitCard(f));
  }

  $('sidebar-content').innerHTML = html;
}

function flyToSpot(lat, lon, name, bloomRate, fullRate, status) {
  mapInstance.flyTo([lat, lon], 14, { duration: 0.8 });
  L.popup().setLatLng([lat, lon])
    .setContent(`<b>${name}</b><br>Bloom: ${bloomRate}% &middot; Full: ${fullRate}%<br>${status}`)
    .openOn(mapInstance);
}

async function findBestDates() {
  const start = $('date-start').value;
  const end = $('date-end').value;
  if (!start || !end) { alert('Pick both dates'); return; }

  $('sidebar-header').innerHTML = `<h2>Best for ${start} to ${end}</h2><p>Searching...</p>`;
  $('sidebar-content').innerHTML = '<div class="loading">Finding blooms...</div>';

  try {
    const data = await api(`/api/sakura/best?start=${start}&end=${end}`);
    if (!data.matches?.length) {
      $('sidebar-header').innerHTML = `<h2>No blooms found</h2><p>${start} to ${end}</p>`;
      $('sidebar-content').innerHTML = `<div class="loading">No cities in bloom during these dates.<br><br>Season: Okinawa Jan-Feb, Kyushu/Kansai late Mar, Kanto early Apr, Tohoku mid Apr, Hokkaido late Apr-May.</div>`;
      return;
    }

    $('sidebar-header').innerHTML = `<h2>${data.matches.length} cities in bloom</h2><p>${start} to ${end}</p>`;
    let html = '';
    for (const city of data.matches) {
      const st = statusText(city.status);
      html += `<div class="spot-item" onclick="loadPrefSpots('${city.prefCode}','${city.prefName}')">
        <h4>${city.cityName} <span style="font-weight:400;color:var(--gray-400)">${city.prefName}</span></h4>
        <div class="sub">
          <span class="badge ${st.cls}">${st.text}</span>
          &nbsp; Full bloom: ${sakuraDateOk(city.fullBloom.forecast) ? fmtDate(city.fullBloom.forecast) : '—'}${city.fullBloom.observation ? ' → '+fmtDate(city.fullBloom.observation) : ''}
        </div>
      </div>`;
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

function haversineKm(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function searchTrip() {
  const input = $('trip-cities').value;
  const radiusKm = parseInt($('trip-radius').value);
  const m = tripMonth;
  const cities = input.split(/[,\n]+/).map(c => c.trim().toLowerCase()).filter(Boolean);
  if (!cities.length) { alert('Enter at least one city'); return; }

  const resolved = [], unknown = [];
  for (const city of cities) {
    const coords = TOURIST_CITIES[city];
    if (coords) resolved.push({ name: city, lat: coords[0], lon: coords[1] });
    else unknown.push(city);
  }
  if (!resolved.length) {
    $('trip-results').innerHTML = `<div style="padding:16px;color:#dc2626">Could not find: ${unknown.join(', ')}. Try the city names listed above.</div>`;
    return;
  }

  $('trip-results').innerHTML = '<div class="loading">Loading...</div>';

  try {
    // Load data sources
    const isSakuraSeason = m >= 2 && m <= 5;
    const isKoyoSeason = m >= 9 && m <= 12;
    if (!allSpotsData && isSakuraSeason) allSpotsData = await api('/api/sakura/all-spots');
    if (!farmDataCache) { try { farmDataCache = await api('/api/fruit/farms'); } catch {} }

    clearMarkers();
    const bounds = [];

    // City pins
    for (const city of resolved) {
      const pin = L.marker([city.lat, city.lon], {
        icon: L.divIcon({
          html: `<div style="background:#3b82f6;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">📍</div>`,
          className: '', iconSize: [28, 28], iconAnchor: [14, 14],
        })
      }).addTo(mapInstance);
      pin.bindPopup(`<b>${city.name.charAt(0).toUpperCase()+city.name.slice(1)}</b>`);
      markers.push(pin);
      bounds.push([city.lat, city.lon]);
    }

    function nearCity(lat, lon) {
      for (const city of resolved) {
        const d = haversineKm(city.lat, city.lon, lat, lon);
        if (d <= radiusKm) return { city: city.name, dist: Math.round(d) };
      }
      return null;
    }

    // ── Sakura spots (Feb–May) ──
    const nearbySakura = [];
    if (isSakuraSeason && allSpotsData) {
      for (const spot of allSpotsData.spots) {
        if (!spot.lat || !spot.lon) continue;
        const nc = nearCity(spot.lat, spot.lon);
        if (nc) nearbySakura.push({ ...spot, ...nc });
      }
      nearbySakura.sort((a, b) => a.dist - b.dist);
    }

    // ── Fruit farms (in-season for selected month) ──
    const nearbyFarms = [];
    const farms = farmDataCache?.spots || [];
    for (const farm of farms) {
      if (!farm.lat || !farm.lon) continue;
      const inSeason = farm.fruits?.some(fr => FRUITS.find(f => f.name === fr && f.months.includes(m)));
      if (!inSeason) continue;
      const nc = nearCity(farm.lat, farm.lon);
      if (nc) nearbyFarms.push({ ...farm, ...nc });
    }
    nearbyFarms.sort((a, b) => a.dist - b.dist);

    // Build cluster for sakura
    if (nearbySakura.length) {
      clusterGroup = L.markerClusterGroup({ maxClusterRadius: 35, showCoverageOnHover: false,
        iconCreateFunction: function(cluster) {
          const n = cluster.getChildCount();
          const sz = Math.min(34 + n * 0.3, 52);
          return L.divIcon({ html: `<div style="background:#ec4899;color:white;width:${sz}px;height:${sz}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2)">${n}</div>`, className: '', iconSize: [sz, sz] });
        }
      });
      for (const spot of nearbySakura) {
        const mk = L.circleMarker([spot.lat, spot.lon], {
          radius: sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast),
          fillColor: sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast),
          color: 'white', weight: 1.5, fillOpacity: 0.9,
        });
        mk.bindPopup(spotPopupHtml(spot));
        clusterGroup.addLayer(mk);
        bounds.push([spot.lat, spot.lon]);
      }
      mapInstance.addLayer(clusterGroup);
    }

    // Fruit markers (individual, no cluster to keep distinct from sakura)
    for (const farm of nearbyFarms) {
      const emoji = FRUITS.find(f => farm.fruits?.includes(f.name) && f.months.includes(m))?.emoji || '🌿';
      const srcLabel = farm.source === 'jalan' ? 'Jalan' : farm.url?.includes('navitime') ? 'Navitime' : null;
      const mk = L.marker([farm.lat, farm.lon], {
        icon: L.divIcon({
          html: `<div style="background:white;border:2px solid #16a34a;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.2)">${emoji}</div>`,
          className: '', iconSize: [24, 24], iconAnchor: [12, 12],
        })
      });
      mk.bindPopup(`<div style="min-width:180px"><b>${farm.name}</b><br>
        <span style="font-size:11px;color:#666">${farm.address||''}</span><br>
        <span style="font-size:11px">${(farm.fruits||[]).join(' · ')}</span>
        <div style="margin-top:6px">
          <a href="https://www.google.com/maps/search/?api=1&query=${farm.lat},${farm.lon}" target="_blank" style="color:#ec4899;font-size:12px">Google Maps</a>
          ${farm.url && srcLabel ? ` &middot; <a href="${farm.url}" target="_blank" style="color:#0369a1;font-size:12px">${srcLabel} →</a>` : ''}
        </div></div>`);
      mk.addTo(mapInstance);
      markers.push(mk);
      bounds.push([farm.lat, farm.lon]);
    }

    if (bounds.length > resolved.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });

    // ── Sidebar ──
    const cityLabel = resolved.map(c => c.name.charAt(0).toUpperCase()+c.name.slice(1)).join(', ');
    const inSeasonFruits = FRUITS.filter(f => f.months.includes(m));
    let html = '';
    if (unknown.length) html += `<div style="padding:8px 16px;background:#fef3c7;font-size:0.82rem">Unknown cities: ${unknown.join(', ')}</div>`;

    // Seasonal summary
    const seasonItems = [];
    if (isSakuraSeason) seasonItems.push(`🌸 Cherry blossom${m >= 3 && m <= 4 ? ' <b style="color:#be185d">(peak season!)</b>' : ''}`);
    if (inSeasonFruits.length) seasonItems.push(`${inSeasonFruits[0].emoji} Fruit picking: ${inSeasonFruits.map(f=>f.name).join(', ')}`);
    if (isKoyoSeason) seasonItems.push(`🍂 Autumn leaves${m >= 10 && m <= 11 ? ' <b style="color:#ea580c">(peak season!)</b>' : ''}`);
    if (!seasonItems.length) seasonItems.push('🌿 Off-peak season — great for fruit picking farms');

    html += `<div style="margin:10px 16px;padding:10px 12px;background:#f8fafc;border:1px solid var(--gray-200);border-radius:8px;font-size:0.82rem">
      <b>${MO[m-1]} near ${cityLabel}:</b><br>
      ${seasonItems.map(s => `<div style="margin-top:4px">${s}</div>`).join('')}
    </div>`;

    // Sakura section
    if (isSakuraSeason) {
      html += `<div style="padding:10px 16px;background:var(--pink-light);font-weight:600;font-size:0.85rem;color:var(--pink-dark);border-bottom:1px solid var(--gray-200)">🌸 Cherry Blossom — ${nearbySakura.length} spots within ${radiusKm}km</div>`;
      if (nearbySakura.length) {
        nearbySakura.slice(0, 20).forEach(spot => {
          html += `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',${spot.bloomRate},${spot.fullRate},'${spot.status.replace(/'/g,"\\'")}')">
            <h4>${spot.name} ${spot.nameRomaji ? '<span style="font-weight:400;color:var(--gray-600)">'+spot.nameRomaji+'</span>' : ''}</h4>
            ${bloomBar(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)}
            <div class="sub" style="margin-top:4px">${spot.dist}km from ${spot.city.charAt(0).toUpperCase()+spot.city.slice(1)} &middot; ${fmtDates(spot.bloomForecast,spot.bloomRate,spot.fullBloomForecast,spot.fullRate)}</div>
          </div>`;
        });
        if (nearbySakura.length > 20) html += `<div class="sub" style="padding:8px 16px;color:var(--gray-400)">+ ${nearbySakura.length - 20} more spots on map</div>`;
      } else {
        html += `<div style="padding:12px 16px;font-size:0.82rem;color:var(--gray-400)">No sakura spots within ${radiusKm}km. Try a larger radius.</div>`;
      }
    }

    // Fruit section
    if (inSeasonFruits.length) {
      html += `<div style="padding:10px 16px;background:#f0fdf4;font-weight:600;font-size:0.85rem;color:#15803d;border-bottom:1px solid #bbf7d0;border-top:1px solid var(--gray-200)">🍎 Fruit Picking — ${nearbyFarms.length} farms within ${radiusKm}km</div>`;
      if (nearbyFarms.length) {
        nearbyFarms.slice(0, 15).forEach(farm => {
          const srcLabel = farm.source === 'jalan' ? 'Jalan' : farm.url?.includes('navitime') ? 'Navitime' : null;
          html += `<div class="spot-item" onclick="mapInstance.flyTo([${farm.lat},${farm.lon}],14)">
            <h4>${farm.name}</h4>
            <div class="sub">${farm.dist}km · ${(farm.fruits||[]).join(', ')}</div>
            <div class="sub">${farm.address||''}${farm.url && srcLabel ? ` &middot; <a href="${farm.url}" target="_blank" onclick="event.stopPropagation()" style="color:#0369a1">${srcLabel} →</a>` : ''}</div>
          </div>`;
        });
        if (nearbyFarms.length > 15) html += `<div class="sub" style="padding:8px 16px;color:var(--gray-400)">+ ${nearbyFarms.length - 15} more farms on map</div>`;
      } else {
        html += `<div style="padding:12px 16px;font-size:0.82rem;color:var(--gray-400)">No fruit farms within ${radiusKm}km for ${MO[m-1]}. Try a larger radius.</div>`;
      }
    }

    // Koyo note
    if (isKoyoSeason) {
      html += `<div style="margin:10px 16px;padding:10px 12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;font-size:0.82rem;color:#92400e">
        🍂 Autumn leaves (koyo) peak Oct–Nov across Japan. Switch to the <b>Autumn Leaves</b> tab for forecast maps by region.
      </div>`;
    }

    $('trip-results').innerHTML = html;
  } catch (e) {
    $('trip-results').innerHTML = `<div style="padding:16px;color:#dc2626">${e.message}</div>`;
  }
}

// ── Find Near Me (geolocation) ──
async function findNearMe() {
  if (!navigator.geolocation) {
    alert('Geolocation is not supported by your browser');
    return;
  }

  $('btn-nearme').textContent = 'Locating...';
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    $('btn-nearme').textContent = 'Near Me';

    $('sidebar-header').innerHTML = `<h2>Spots Near You</h2><p>Within 30km of your location</p>`;
    $('sidebar-content').innerHTML = '<div class="loading">Loading nearby spots...</div>';
    updateLegend('sakura');

    try {
      if (!allSpotsData) allSpotsData = await api('/api/sakura/all-spots');
      clearMarkers();

      // Your location marker
      const myMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
          className: '', iconSize: [16, 16], iconAnchor: [8, 8],
        })
      }).addTo(mapInstance);
      myMarker.bindPopup('<b>You are here</b>');
      markers.push(myMarker);

      // Find spots within 30km
      const nearby = [];
      for (const spot of allSpotsData.spots) {
        if (!spot.lat || !spot.lon) continue;
        const dist = haversineKm(lat, lon, spot.lat, spot.lon);
        if (dist <= 30) {
          nearby.push({ ...spot, distance: Math.round(dist * 10) / 10 });
        }
      }
      nearby.sort((a, b) => a.distance - b.distance);

      // Add to map
      for (const spot of nearby) {
        const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
        const marker = L.circleMarker([spot.lat, spot.lon], {
          radius: sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast),
          fillColor: color, color: 'white', weight: 1.5, fillOpacity: 0.9,
        }).addTo(mapInstance);
        marker.bindPopup(spotPopupHtml(spot));
        markers.push(marker);
      }

      mapInstance.setView([lat, lon], 12);

      // Sidebar
      $('sidebar-header').innerHTML = `<h2>Spots Near You</h2><p>${nearby.length} spots within 30km</p>`;
      let html = '';
      for (const spot of nearby) {
        html += spotCardHtml(spot, `${spot.distance}km away`);
      }
      if (nearby.length === 0) {
        html = '<div style="padding:20px;text-align:center;color:var(--gray-400)">No sakura spots within 30km. Are you in Japan?</div>';
      }
      $('sidebar-content').innerHTML = html;
    } catch (e) {
      $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
    }
  }, (err) => {
    $('btn-nearme').textContent = 'Near Me';
    alert('Could not get your location. Make sure location access is enabled.');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// ── Shared spot popup/card HTML builders ──

function spotPopupHtml(spot) {
  const displayName = spot.nameRomaji ? `${spot.name} <span style="color:#888">${spot.nameRomaji}</span>` : spot.name;
  const liveStatus = spotStatusWithDate(spot.bloomRate, spot.fullRate, spot.fullBloomForecast) || spot.status;
  const isEnded = liveStatus.includes('Ended') || liveStatus.includes('Falling') || liveStatus.includes('Past peak') || liveStatus.includes('green');

  // Full-width bar for popup (not the sidebar CSS class which is too narrow)
  let barsHtml = '';
  if (!isEnded) {
    const rate = spot.fullRate > 0 ? spot.fullRate : spot.bloomRate;
    const label = spot.fullRate > 0 ? 'Flowering' : 'Growth';
    const grad = spot.fullRate > 0 ? 'linear-gradient(90deg,#f9a8d4,#be185d)' : 'linear-gradient(90deg,#fdba74,#f97316)';
    barsHtml = `<div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px"><span>${label}</span><span>${rate}%</span></div>
      <div style="height:16px;background:#f0f0f0;border-radius:8px;overflow:hidden">
        <div style="width:${Math.min(rate,100)}%;height:100%;background:${grad};border-radius:8px"></div>
      </div>
    </div>`;
  }

  const statusColor = isEnded ? '#4ade80' : '#be185d';
  return `<div style="min-width:220px">
    <b>${displayName}</b>
    ${barsHtml}
    <div style="margin:4px 0"><b style="color:${statusColor}">${liveStatus}</b></div>
    <span style="font-size:11px;color:#888">${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}</span>
    <div class="popup-weather" data-lat="${spot.lat}" data-lon="${spot.lon}" style="font-size:11px;color:#555;margin-top:6px;padding-top:6px;border-top:1px solid #eee;min-height:60px">
      <div style="color:#ccc;font-size:11px">Loading weather…</div>
    </div>
    <div style="margin-top:4px">
      <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" style="color:#ec4899;font-size:12px">Google Maps</a>
    </div>
  </div>`;
}

function spotCardHtml(spot, extra) {
  return `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',${spot.bloomRate},${spot.fullRate},'${spot.status.replace(/'/g,"\\'")}')">
    <h4>${spot.name} ${spot.nameRomaji ? '<span style="font-weight:400;color:var(--gray-600)">'+spot.nameRomaji+'</span>' : ''}</h4>
    ${bloomBar(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)}
    <div class="sub" style="margin-top:4px">
      ${extra ? extra + ' &middot; ' : ''}${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}
      &middot; <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" onclick="event.stopPropagation()" style="color:#ec4899">Maps</a>
    </div>
  </div>`;
}

// ── Weather card ──
async function loadWeatherCard(cityName) {
  try {
    const data = await api(`/api/weather?city=${encodeURIComponent(cityName)}`);
    const weatherDiv = document.createElement('div');
    weatherDiv.className = 'spot-item';
    weatherDiv.style.background = '#f0f9ff';
    let whtml = '<h4 style="color:#0369a1">Weather Forecast</h4>';
    for (const day of data.forecasts) {
      const temp = day.temperature;
      const maxC = temp?.max?.celsius;
      const rain = day.chanceOfRain;
      const rainHigh = Math.max(
        parseInt(rain?.T06_12) || 0,
        parseInt(rain?.T12_18) || 0,
        parseInt(rain?.T18_24) || 0
      );
      const rainIcon = rainHigh >= 50 ? '🌧' : rainHigh >= 20 ? '🌦' : '☀️';
      whtml += `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:0.82rem">
        <span>${rainIcon} ${day.dateLabel} ${day.date?.slice(5)}</span>
        <span>${day.telop} ${maxC ? maxC+'°C' : ''} ${rainHigh > 0 ? '<span style="color:#0369a1">'+rainHigh+'%</span>' : ''}</span>
      </div>`;
    }
    weatherDiv.innerHTML = whtml;
    // Insert after the JMA station card
    const firstSpot = $('sidebar-content').querySelector('.spot-item:nth-child(2)');
    if (firstSpot) {
      $('sidebar-content').insertBefore(weatherDiv, firstSpot);
    } else {
      $('sidebar-content').appendChild(weatherDiv);
    }
  } catch {} // Weather is optional — don't break the page
}

// ── Load all 1,012 spots on map ──
async function loadAllSpotsOnMap() {
  try {
    if (!allSpotsData) {
      allSpotsData = await api('/api/sakura/all-spots');
    }

    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 40,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        const childMarkers = cluster.getAllChildMarkers();
        // Count spots by actual status (using date-aware logic)
        let ended = 0, peak = 0, blooming = 0, buds = 0, dormant = 0;
        childMarkers.forEach(m => {
          const br = m.options.bloomRate || 0;
          const fr = m.options.fullRate || 0;
          const fbf = m.options.fullBloomForecast;
          if (fr >= 100 && fbf) {
            const days = daysSince(fbf);
            if (days > 6) { ended++; return; }
            if (days >= 0) { peak++; return; }
          }
          if (fr >= 40) { blooming++; return; }
          if (fr > 0 || br >= 100) { blooming++; return; }
          if (br > 0) { buds++; return; }
          dormant++;
        });

        // Color by majority status
        const n = childMarkers.length;
        let color, textColor;
        if (ended > n * 0.5) { color = '#4ade80'; textColor = '#166534'; }        // green — mostly ended
        else if (peak > n * 0.3) { color = '#be185d'; textColor = 'white'; }       // deep pink — peak
        else if (blooming > n * 0.3) { color = '#ec4899'; textColor = 'white'; }   // pink — blooming
        else if (buds > n * 0.3) { color = '#f97316'; textColor = 'white'; }       // orange — buds
        else if (ended > 0 && blooming > 0) { color = '#f9a8d4'; textColor = '#333'; } // mixed
        else { color = '#d4d4d4'; textColor = '#333'; }                             // dormant

        const size = Math.min(38 + n * 0.4, 58);
        return L.divIcon({
          html: `<div style="background:${color};color:${textColor};width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2)">${n}</div>`,
          className: '',
          iconSize: [size, size],
        });
      }
    });

    for (const spot of allSpotsData.spots) {
      if (!spot.lat || !spot.lon) continue;
      if (bloomFilter !== 'all' && bloomCategory(spot.bloomRate, spot.fullRate, spot.fullBloomForecast) !== bloomFilter) continue;
      const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const radius = sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const marker = L.circleMarker([spot.lat, spot.lon], {
        radius, fillColor: color, color: 'white', weight: 1.5, fillOpacity: 0.9,
        bloomRate: spot.bloomRate, fullRate: spot.fullRate, fullBloomForecast: spot.fullBloomForecast,
      });
      marker.bindPopup(spotPopupHtml(spot));
      clusterGroup.addLayer(marker);
    }
    mapInstance.addLayer(clusterGroup);

    // Also load Kawazu cherry spots with distinct markers (★ star, magenta)
    try {
      const kawazu = await api('/api/kawazu');
      for (const spot of kawazu.spots || []) {
        if (!spot.lat || !spot.lon) continue;
        const kEnded = spotStatusWithDate(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)?.includes('Ended');
        const kawazuColor = kEnded ? '#4ade80' : '#db2777';
        const m = L.marker([spot.lat, spot.lon], {
          icon: L.divIcon({
            html: `<div style="background:${kawazuColor};color:white;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.2)" title="Kawazu Cherry">★</div>`,
            className: '', iconSize: [22, 22], iconAnchor: [11, 11],
          })
        }).addTo(mapInstance);
        const kStatus = spotStatusWithDate(spot.bloomRate, spot.fullRate, spot.fullBloomForecast) || 'Kawazu Cherry';
        m.bindPopup(
          `<div style="min-width:200px"><b>${spot.name}</b> ${spot.nameRomaji || ''}<br>` +
          `<em style="color:#db2777">Kawazu Cherry (河津桜)</em><br>` +
          `<b>${kStatus}</b><br>` +
          `<span style="font-size:11px;color:#888">${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}</span><br>` +
          `<a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" style="color:#ec4899;font-size:12px">Google Maps</a></div>`
        );
        markers.push(m);
      }
    } catch {} // Kawazu is bonus — don't break main view

  } catch (e) {
    // Fallback to city markers if all-spots fails
    for (const region of (sakuraData?.regions || [])) {
      for (const city of region.cities) {
        const coords = CITY_COORDS[city.cityName];
        if (!coords) continue;
        const color = statusToColor(city.status);
        const radius = statusToRadius(city.status);
        const marker = L.circleMarker(coords, {
          radius, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.9,
        }).addTo(mapInstance);
        marker.bindPopup(`<div style="min-width:180px"><b>${city.cityName}</b> (${city.prefName})<br><b>${city.status}</b><br><span style="font-size:11px;color:#888">Bloom: ${fmtDate(city.bloom?.forecast)} · Full: ${fmtDate(city.fullBloom?.forecast)}</span></div>`);
        marker.on('click', () => loadPrefSpots(city.prefCode, city.prefName));
        markers.push(marker);
      }
    }
  }
}

// ── Fuzzy search/filter ──
function fuzzyMatch(text, query) {
  if (text.includes(query)) return true;
  let ti = 0;
  for (let qi = 0; qi < query.length; qi++) {
    const found = text.indexOf(query[qi], ti);
    if (found === -1) return false;
    ti = found + 1;
  }
  return true;
}

let searchTimeout = null;
function filterSidebar(query) {
  const q = query.toLowerCase().replace(/[\s\-]/g, '');

  // If empty, restore the current view
  if (!q) {
    document.querySelectorAll('.spot-item').forEach(el => el.style.display = '');
    return;
  }

  // If we have all spots loaded and query is 3+ chars, do a global search
  if (allSpotsData && q.length >= 3) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => globalSpotSearch(q), 300);
    return;
  }

  // Otherwise filter what's visible in sidebar
  document.querySelectorAll('.spot-item').forEach(el => {
    const text = el.textContent.toLowerCase().replace(/[\s\-]/g, '');
    el.style.display = fuzzyMatch(text, q) ? '' : 'none';
  });
}

function globalSpotSearch(q) {
  const matches = allSpotsData.spots.filter(spot => {
    const text = `${spot.name} ${spot.nameRomaji || ''} ${spot.nameReading || ''} ${spot.prefecture || ''}`.toLowerCase().replace(/[\s\-]/g, '');
    return fuzzyMatch(text, q);
  }).slice(0, 50); // limit to 50 results

  if (matches.length === 0) {
    // Fall back to sidebar filter
    document.querySelectorAll('.spot-item').forEach(el => {
      const text = el.textContent.toLowerCase().replace(/[\s\-]/g, '');
      el.style.display = fuzzyMatch(text, q) ? '' : 'none';
    });
    return;
  }

  // Show results in sidebar
  $('sidebar-header').innerHTML = `<h2>Search: "${q}"</h2><p>${matches.length} spots found${matches.length>=50?' (showing first 50)':''}</p>`;
  let html = '';
  for (const spot of matches) {
    html += spotCardHtml(spot, spot.prefecture || '');
  }
  $('sidebar-content').innerHTML = html;

  // Highlight on map
  clearMarkers();
  const bounds = [];
  for (const spot of matches) {
    if (!spot.lat || !spot.lon) continue;
    const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
    const marker = L.circleMarker([spot.lat, spot.lon], {
      radius: 8, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.9,
    }).addTo(mapInstance);
    marker.bindPopup(spotPopupHtml(spot));
    markers.push(marker);
    bounds.push([spot.lat, spot.lon]);
  }
  if (bounds.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });
}

$('date-end').value = nextWeek;
initMap();
