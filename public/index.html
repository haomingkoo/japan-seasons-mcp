<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <title>Japan Sakura & Koyo Forecast — Cherry Blossom & Autumn Leaves</title>
  <meta name="description" content="Real-time cherry blossom and autumn leaves forecast for Japan. 1,700+ spots with live bloom data on an interactive map.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ec4899; --pink-light: #fdf2f8; --pink-dark: #be185d;
      --orange: #ea580c; --orange-light: #fff7ed;
      --green: #059669; --green-light: #ecfdf5;
      --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e5e5e5;
      --gray-400: #a3a3a3; --gray-600: #525252; --gray-800: #262626;
      --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--gray-800); background: var(--gray-50); }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: white; border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0; gap: 12px; flex-wrap: wrap;
    }
    .top-bar h1 { font-size: 1.15rem; font-weight: 700; white-space: nowrap; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .sidebar {
      width: 380px; overflow-y: auto; background: white;
      border-left: 1px solid var(--gray-200); flex-shrink: 0;
    }

    /* ── Controls ── */
    .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .mode-btn {
      padding: 6px 14px; border: 1px solid var(--gray-200); border-radius: 20px;
      background: white; cursor: pointer; font-size: 0.82rem; font-weight: 500;
      color: var(--gray-600); transition: all 0.2s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .mode-btn.koyo.active { background: var(--orange); color: white; border-color: var(--orange); }
    .mode-btn:hover:not(.active) { border-color: var(--gray-400); }
    .date-input {
      padding: 5px 10px; border: 1px solid var(--gray-200); border-radius: 8px;
      font-size: 0.82rem; background: white;
    }
    .find-btn {
      padding: 5px 14px; background: var(--pink); color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 500;
    }

    /* ── Sidebar content ── */
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .sidebar-header h2 { font-size: 1rem; margin-bottom: 2px; }
    .sidebar-header p { font-size: 0.8rem; color: var(--gray-600); }
    .sidebar-content { padding: 0; }

    .spot-item {
      padding: 12px 16px; border-bottom: 1px solid var(--gray-100);
      cursor: pointer; transition: background 0.15s;
    }
    .spot-item:hover { background: var(--gray-50); }
    .spot-item h4 { font-size: 0.88rem; margin-bottom: 3px; }
    .spot-item .sub { font-size: 0.78rem; color: var(--gray-600); }

    /* ── Bloom bar ── */
    .bloom-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .bloom-label { font-size: 0.72rem; color: var(--gray-400); width: 68px; }
    .bloom-track { flex: 1; height: 14px; background: var(--gray-100); border-radius: 7px; overflow: hidden; }
    .bloom-fill {
      height: 100%; border-radius: 7px; display: flex; align-items: center;
      justify-content: flex-end; padding-right: 4px;
      font-size: 0.65rem; font-weight: 600; color: white; min-width: 24px;
    }
    .bloom-fill.b { background: linear-gradient(90deg, #fdba74, #f97316); }
    .bloom-fill.f { background: linear-gradient(90deg, #f9a8d4, #be185d); }

    /* ── Badge ── */
    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 0.7rem; font-weight: 500;
    }
    .badge.peak { background: #fce7f3; color: #be185d; }
    .badge.bloom { background: #fdf2f8; color: #ec4899; }
    .badge.soon { background: #ecfdf5; color: #059669; }
    .badge.ended { background: var(--gray-100); color: var(--gray-400); }

    /* ── Legend ── */
    .legend {
      position: absolute; bottom: 20px; left: 20px; z-index: 1000;
      background: white; padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 0.75rem;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    /* ── Loading ── */
    .loading { padding: 40px; text-align: center; color: var(--gray-400); }

    /* ── Footer link ── */
    .footer-link {
      padding: 16px; text-align: center; font-size: 0.75rem; color: var(--gray-400);
      border-top: 1px solid var(--gray-200);
    }
    .footer-link a { color: var(--gray-600); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .map-container { height: 50vh; }
      .sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid var(--gray-200); }
      .top-bar h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <h1>Japan Sakura & Koyo</h1>
    <div class="controls">
      <button class="mode-btn active" id="btn-sakura" onclick="setMode('sakura')">Cherry Blossom</button>
      <button class="mode-btn koyo" id="btn-koyo" onclick="setMode('koyo')">Autumn Leaves</button>
      <button class="mode-btn" id="btn-trip" onclick="setMode('trip')">Plan My Trip</button>
      <button class="mode-btn" onclick="findNearMe()" id="btn-nearme" title="Find sakura spots near your current location">Near Me</button>
      <span style="color:var(--gray-200)">|</span>
      <input type="date" class="date-input" id="date-start">
      <span style="font-size:0.8rem;color:var(--gray-400)">to</span>
      <input type="date" class="date-input" id="date-end">
      <button class="find-btn" onclick="findBestDates()">Find</button>
    </div>
  </div>

  <div class="main">
    <div class="map-container">
      <div id="map"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header" id="sidebar-header">
        <h2>Loading...</h2>
        <p>Select a region on the map or browse below</p>
      </div>
      <div style="padding:8px 16px;border-bottom:1px solid var(--gray-200)">
        <input type="text" id="search-box" placeholder="Search city or spot name..."
          oninput="filterSidebar(this.value)"
          style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:0.85rem">
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <div class="loading">Loading forecast data...</div>
      </div>
      <div class="footer-link">
        Data: <a href="https://n-kishou.com">Japan Meteorological Corp</a> &middot;
        Forecasts update Thursdays &middot; Bloom meters update daily 9AM JST<br>
        MCP: <code>sakura.kooexperience.com/mcp</code> &middot;
        <a href="https://github.com/haomingkoo/japan-sakura-koyo-mcp">GitHub</a> &middot;
        <a href="https://www.npmjs.com/package/japan-sakura-koyo-mcp">npm</a>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let mode = 'sakura';
let sakuraData = null;
let allSpotsData = null;
let mapInstance = null;
let markers = [];
let clusterGroup = null;

// ── Map setup ──
function initMap() {
  mapInstance = L.map('map', { zoomControl: false }).setView([36.5, 137.5], 6);
  L.control.zoom({ position: 'topright' }).addTo(mapInstance);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 18,
  }).addTo(mapInstance);
}

// ── Helpers ──
const $ = id => document.getElementById(id);
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`Error: ${r.status}`);
  return r.json();
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
// Prefix with ~ when rate < 100 to indicate it's still a forecast
function fmtForecast(iso, rate) {
  if (!iso) return '—';
  return (rate >= 100 ? '' : '~') + fmtDate(iso);
}
// Full date line: confirmed = plain date, forecast = "(est.)" suffix
function fmtDates(bloomForecast, bloomRate, fullBloomForecast, fullRate) {
  const b = bloomRate >= 100 ? `Bloomed: ${fmtDate(bloomForecast)}` : `Bloom: ${fmtDate(bloomForecast)} (est.)`;
  const f = fullRate >= 100 ? `Full bloom: ${fmtDate(fullBloomForecast)}` : `Full bloom: ${fmtDate(fullBloomForecast)} (est.)`;
  return `${b} · ${f}`;
}

// ── Color by bloom rate + date ──
// Lifecycle: orange (bud/growth) → pink (flowering) → green (ended/leaves)
// fullRate stays at 100% forever after peak — use forecast date to detect "ended"
function sakuraColor(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100) {
    const daysSinceFull = fullBloomForecast ? Math.floor((Date.now() - new Date(fullBloomForecast).getTime()) / 86400000) : 0;
    if (daysSinceFull > 10) return '#4ade80';  // green — ended, leaves out
    if (daysSinceFull > 6) return '#86efac';   // light green — petals falling
    return '#be185d';                           // deep pink — still at peak
  }
  if (fullRate >= 70) return '#ec4899';
  if (fullRate >= 20) return '#f472b6';
  if (fullRate > 0) return '#f9a8d4';
  if (bloomRate >= 85) return '#f97316';
  if (bloomRate >= 60) return '#fb923c';
  if (bloomRate > 0) return '#fdba74';
  return '#d4d4d4';
}

// Spot status text also needs the date check
function spotStatusWithDate(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = Math.floor((Date.now() - new Date(fullBloomForecast).getTime()) / 86400000);
    if (days > 10) return 'Ended — green leaves';
    if (days > 6) return 'Falling — petals scattering';
    if (days > 3) return 'Past peak — still some petals';
    return 'Full bloom — best viewing!';
  }
  return null; // use default from growthStage/floweringStage
}

function sakuraRadius(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = Math.floor((Date.now() - new Date(fullBloomForecast).getTime()) / 86400000);
    if (days > 6) return 5;  // ended — smaller
  }
  if (fullRate >= 90) return 9;
  if (fullRate > 0) return 7;
  if (bloomRate > 0) return 5;
  return 4;
}

// Returns human-readable stage name from the bloom/full rates
function growthStage(bloomRate) {
  if (bloomRate >= 100) return 'Bloomed';
  if (bloomRate >= 85) return 'Buds opening';
  if (bloomRate >= 60) return 'Buds swelling';
  if (bloomRate > 0) return 'Bud stage';
  return 'Dormant';
}
function floweringStage(fullRate) {
  if (fullRate >= 100) return 'Full bloom';
  if (fullRate >= 90) return 'Nearly full';
  if (fullRate >= 70) return '70%';
  if (fullRate >= 40) return '50%';
  if (fullRate >= 20) return '30%';
  if (fullRate > 0) return 'Starting';
  return 'Not yet';
}
// Show only the most relevant bar. Hide entirely once past peak (> 3 days after full bloom).
function bloomBar(bloomRate, fullRate, fullBloomForecast) {
  if (fullRate >= 100 && fullBloomForecast) {
    const days = Math.floor((Date.now() - new Date(fullBloomForecast).getTime()) / 86400000);
    if (days > 3) return ''; // past peak — no bar, status line says it all
  }
  if (fullRate > 0) {
    return `<div class="bloom-row"><span class="bloom-label">Flowering</span><div class="bloom-track"><div class="bloom-fill f" style="width:${Math.min(fullRate,100)}%">${fullRate}%</div></div><span style="font-size:0.72rem;color:var(--gray-600);width:80px;text-align:right">${floweringStage(fullRate)}</span></div>`;
  }
  return `<div class="bloom-row"><span class="bloom-label">Growth</span><div class="bloom-track"><div class="bloom-fill b" style="width:${Math.min(bloomRate,100)}%">${bloomRate}%</div></div><span style="font-size:0.72rem;color:var(--gray-600);width:80px;text-align:right">${growthStage(bloomRate)}</span></div>`;
}

// Map city status text to dot color/size for the overview map
function statusToColor(status) {
  if (status.includes('Full bloom') || status.includes('best')) return '#be185d';
  if (status.includes('Falling') || status.includes('scattering')) return '#f9a8d4';
  if (status.includes('Blooming') || status.includes('Approaching')) return '#ec4899';
  if (status.includes('Coming') || status.includes('soon')) return '#f97316';
  if (status.includes('Ended')) return '#4ade80';  // green — leaves out
  return '#d4d4d4';
}
function statusToRadius(status) {
  if (status.includes('Full bloom') || status.includes('best')) return 10;
  if (status.includes('Blooming') || status.includes('Falling')) return 8;
  if (status.includes('Coming') || status.includes('soon')) return 6;
  return 5;
}

function statusText(status) {
  if (status.includes('Full bloom') || status.includes('mankai') || status.includes('best')) return { text: status.split('—')[0].trim(), cls: 'peak' };
  if (status.includes('bloom') || status.includes('Bloom') || status.includes('咲き')) return { text: status.split('—')[0].trim(), cls: 'bloom' };
  if (status.includes('Coming') || status.includes('soon') || status.includes('つぼみ') || status.includes('Bud')) return { text: status.split('—')[0].trim(), cls: 'soon' };
  return { text: status.split('—')[0].trim(), cls: 'ended' };
}

// ── City coordinates for map markers (48 JMA observation cities) ──
const CITY_COORDS = {

  "Osaka":[34.694,135.502],"Hikone":[35.276,136.246],"Kyoto":[35.012,135.768],
  "Kobe":[34.691,135.183],"Nara":[34.685,135.833],"Wakayama":[34.226,135.168],
  "Hiroshima":[34.397,132.46],"Tottori":[35.501,134.235],"Matsue":[35.472,133.051],
  "Okayama":[34.662,133.935],"Shimonoseki":[33.95,130.941],
  "Tokushima":[34.066,134.559],"Takamatsu":[34.34,134.043],"Matsuyama":[33.842,132.766],"Kochi":[33.559,133.531],
  "Fukuoka":[33.59,130.402],"Saga":[33.263,130.301],"Nagasaki":[32.745,129.873],
  "Kumamoto":[32.803,130.707],"Oita":[33.238,131.613],"Miyazaki":[31.911,131.424],"Kagoshima":[31.596,130.557],
};

// ── Mode switching ──
function setMode(m) {
  mode = m;
  $('btn-sakura').classList.toggle('active', m === 'sakura');
  $('btn-trip').classList.toggle('active', m === 'trip');
  $('btn-koyo').classList.toggle('active', m === 'koyo');
  if (m === 'sakura') loadSakura();
  if (m === 'trip') loadTripPlanner();
  if (m === 'koyo') loadKoyo();
}

// ── SAKURA ──
async function loadSakura() {
  $('sidebar-header').innerHTML = '<h2>Cherry Blossom Forecast</h2><p>48 cities &middot; 1,012 spots &middot; Click a city to see spots</p>';
  $('sidebar-content').innerHTML = '<div class="loading">Loading...</div>';
  updateLegend('sakura');

  try {
    if (!sakuraData) sakuraData = await api('/api/sakura/forecast');
    clearMarkers();

    // Load ALL 1,012 spots on map with clustering
    loadAllSpotsOnMap();

    // Render sidebar with regions
    let html = '';
    for (const region of sakuraData.regions) {
      html += `<div style="padding:12px 16px;background:var(--gray-50);font-weight:600;font-size:0.85rem;border-bottom:1px solid var(--gray-200)">${region.nameEn}</div>`;
      for (const city of region.cities) {
        const st = statusText(city.status);
        html += `<div class="spot-item" onclick="loadPrefSpots('${city.prefCode}', '${city.prefName}')">
          <h4>${city.cityName} <span style="font-weight:400;color:var(--gray-400)">${city.prefName}</span></h4>
          <div class="sub">
            <span class="badge ${st.cls}">${st.text}</span>
            &nbsp; Bloom: ${fmtDate(city.bloom.forecast)}${city.bloom.observation ? ' → '+fmtDate(city.bloom.observation) : ''}
            &nbsp; Full: ${fmtDate(city.fullBloom.forecast)}${city.fullBloom.observation ? ' → '+fmtDate(city.fullBloom.observation) : ''}
          </div>
        </div>`;
      }
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

async function loadPrefSpots(prefCode, prefName) {
  $('sidebar-header').innerHTML = `<h2>${prefName} Spots</h2><p>Loading...</p>`;
  $('sidebar-content').innerHTML = '<div class="loading">Loading spots...</div>';

  try {
    const data = await api(`/api/sakura/spots?pref=${prefCode}`);
    clearMarkers();

    // Add spots to map
    const bounds = [];
    for (const spot of data.spots) {
      if (!spot.lat || !spot.lon) continue;
      const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const radius = sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const marker = L.circleMarker([spot.lat, spot.lon], {
        radius, fillColor: color, color: 'white', weight: 1.5,
        fillOpacity: 0.9,
      }).addTo(mapInstance);
      marker.bindPopup(spotPopupHtml(spot));
      markers.push(marker);
      bounds.push([spot.lat, spot.lon]);
    }
    if (bounds.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });

    // Sidebar
    const updated = data.lastUpdated ? new Date(data.lastUpdated).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : 'Unknown';
    $('sidebar-header').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h2>${prefName}</h2><p>${data.spots.length} spots &middot; Updated: ${updated}</p></div>
        <button onclick="loadSakura()" style="border:1px solid var(--gray-200);background:white;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem">&larr; Back</button>
      </div>`;

    let html = '';
    if (data.jmaStation) {
      const jma = data.jmaStation;
      html += `<div class="spot-item" style="background:var(--pink-light)">
        <h4>JMA Station: ${jma.name}</h4>
        ${bloomBar(jma.bloomRate, jma.fullRate, jma.fullBloomForecast)}
      </div>`;

      // Load weather for this city
      loadWeatherCard(jma.name);
    }
    for (const spot of data.spots) {
      html += `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',${spot.bloomRate},${spot.fullRate},'${spot.status.replace(/'/g,"\\'")}')">
        <h4>${spot.name} ${spot.nameRomaji ? '<span style="font-weight:400;color:var(--gray-600)">'+spot.nameRomaji+'</span>' : ''}</h4>
        ${bloomBar(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)}
        <div class="sub" style="margin-top:4px">
          ${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}
          &nbsp;&middot;&nbsp; <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" onclick="event.stopPropagation()" style="color:#ec4899">Google Maps &rarr;</a>
        </div>
      </div>`;
    }
    $('sidebar-content').innerHTML = html;
  } catch (e) {
    $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
  }
}

function flyToSpot(lat, lon, name, bloomRate, fullRate, status) {
  mapInstance.flyTo([lat, lon], 14, { duration: 0.8 });
  L.popup().setLatLng([lat, lon])
    .setContent(`<b>${name}</b><br>Bloom: ${bloomRate}% &middot; Full: ${fullRate}%<br>${status}`)
    .openOn(mapInstance);
}

// ── KOYO ──
async function loadKoyo() {
  $('sidebar-header').innerHTML = '<h2>Autumn Leaves Forecast</h2><p>687 spots across Japan</p>';
  $('sidebar-content').innerHTML = '<div class="loading">Loading...</div>';
  updateLegend('koyo');
  clearMarkers();

  try {
    const data = await api('/api/koyo/forecast');
    let html = '';
    for (const region of data.regions) {

async function loadKoyoSpots(prefCode, name) {
  $('sidebar-header').innerHTML = `<h2>${name} Spots</h2><p>Loading...</p>`;
  try {
    const data = await api(`/api/koyo/spots?pref=${prefCode}`);
    clearMarkers();
    const bounds = [];
    for (const spot of data.spots) {
      if (!spot.lat || !spot.lon) continue;
      const color = spot.status.includes('Peak') ? '#ea580c' : spot.status.includes('Turning') ? '#fdba74' : '#e5e5e5';
      const marker = L.circleMarker([spot.lat, spot.lon], {

  "tokyo":[35.689,139.692],"osaka":[34.694,135.502],"kyoto":[35.012,135.768],

function haversineKm(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function searchTrip() {
  const input = $('trip-cities').value;
  const radiusKm = parseInt($('trip-radius').value);
  const cities = input.split(/[,\n]+/).map(c => c.trim().toLowerCase()).filter(Boolean);

  if (!cities.length) { alert('Enter at least one city'); return; }

  // Resolve city coordinates
  const resolved = [];
  const unknown = [];
  for (const city of cities) {
    const coords = TOURIST_CITIES[city];
    if (coords) resolved.push({ name: city, lat: coords[0], lon: coords[1] });
    else unknown.push(city);
  }

  if (resolved.length === 0) {
    $('trip-results').innerHTML = `<div style="padding:16px;color:#dc2626">Could not find: ${unknown.join(', ')}. Try the city names listed above.</div>`;
    return;
  }

  $('trip-results').innerHTML = '<div class="loading">Loading spots near your cities...</div>';

  try {
    if (!allSpotsData) allSpotsData = await api('/api/sakura/all-spots');

    clearMarkers();
    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 35,
      showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        const n = cluster.getChildCount();
        const size = Math.min(35 + n * 0.3, 55);
        return L.divIcon({
          html: `<div style="background:#ec4899;color:white;width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2)">${n}</div>`,
          className: '', iconSize: [size, size],
        });
      }
    });

    // Find spots near any of the resolved cities
    const nearbySpots = [];
    for (const spot of allSpotsData.spots) {
      if (!spot.lat || !spot.lon) continue;
      for (const city of resolved) {
        const dist = haversineKm(city.lat, city.lon, spot.lat, spot.lon);
        if (dist <= radiusKm) {
          nearbySpots.push({ ...spot, nearCity: city.name, distance: Math.round(dist) });
          break;
        }
      }
    }

    // Add city markers (blue)
    const bounds = [];
    for (const city of resolved) {
      const m = L.marker([city.lat, city.lon], {
        icon: L.divIcon({
          html: `<div style="background:#3b82f6;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">📍</div>`,
          className: '', iconSize: [28, 28], iconAnchor: [14, 14],
        })
      }).addTo(mapInstance);
      m.bindPopup(`<b>${city.name.charAt(0).toUpperCase() + city.name.slice(1)}</b><br>Your destination`);
      markers.push(m);
      bounds.push([city.lat, city.lon]);
    }

    // Add spot markers
    for (const spot of nearbySpots) {
      const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const marker = L.circleMarker([spot.lat, spot.lon], {
        radius: sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast),
        fillColor: color, color: 'white', weight: 1.5, fillOpacity: 0.9,
      });
      marker.bindPopup(spotPopupHtml(spot));
      clusterGroup.addLayer(marker);
      bounds.push([spot.lat, spot.lon]);
    }

    mapInstance.addLayer(clusterGroup);
    if (bounds.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });

    // Sidebar results
    let html = '';
    if (unknown.length) {
      html += `<div style="padding:8px 16px;background:#fef3c7;font-size:0.82rem">Unknown cities: ${unknown.join(', ')}</div>`;
    }
    html += `<div style="padding:12px 16px;background:var(--gray-50);font-weight:600;font-size:0.85rem;border-bottom:1px solid var(--gray-200)">${nearbySpots.length} spots within ${radiusKm}km of ${resolved.map(c=>c.name.charAt(0).toUpperCase()+c.name.slice(1)).join(', ')}</div>`;

    // Sort by distance
    nearbySpots.sort((a, b) => a.distance - b.distance);

    for (const spot of nearbySpots) {
      html += `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',${spot.bloomRate},${spot.fullRate},'${spot.status.replace(/'/g,"\\'")}')">
        <h4>${spot.name} ${spot.nameRomaji ? '<span style="font-weight:400;color:var(--gray-600)">'+spot.nameRomaji+'</span>' : ''}</h4>
        ${bloomBar(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)}
        <div class="sub" style="margin-top:4px">
          ${spot.distance}km from ${spot.nearCity.charAt(0).toUpperCase()+spot.nearCity.slice(1)} &middot;
          ${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}
          &middot; <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" onclick="event.stopPropagation()" style="color:#ec4899">Maps &rarr;</a>
        </div>
      </div>`;
    }

    if (nearbySpots.length === 0) {
      html += '<div style="padding:20px;text-align:center;color:var(--gray-400)">No sakura spots found within the radius. Try increasing the distance.</div>';
    }

    $('trip-results').innerHTML = html;
  } catch (e) {
    $('trip-results').innerHTML = `<div style="padding:16px;color:#dc2626">${e.message}</div>`;
  }
}

// ── Find Near Me (geolocation) ──
async function findNearMe() {
  if (!navigator.geolocation) {
    alert('Geolocation is not supported by your browser');
    return;
  }

  $('btn-nearme').textContent = 'Locating...';
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    $('btn-nearme').textContent = 'Near Me';

    $('sidebar-header').innerHTML = `<h2>Spots Near You</h2><p>Within 30km of your location</p>`;
    $('sidebar-content').innerHTML = '<div class="loading">Loading nearby spots...</div>';
    updateLegend('sakura');

    try {
      if (!allSpotsData) allSpotsData = await api('/api/sakura/all-spots');
      clearMarkers();

      // Your location marker
      const myMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
          className: '', iconSize: [16, 16], iconAnchor: [8, 8],
        })
      }).addTo(mapInstance);
      myMarker.bindPopup('<b>You are here</b>');
      markers.push(myMarker);

      // Find spots within 30km
      const nearby = [];
      for (const spot of allSpotsData.spots) {
        if (!spot.lat || !spot.lon) continue;
        const dist = haversineKm(lat, lon, spot.lat, spot.lon);
        if (dist <= 30) {
          nearby.push({ ...spot, distance: Math.round(dist * 10) / 10 });
        }
      }
      nearby.sort((a, b) => a.distance - b.distance);

      // Add to map
      for (const spot of nearby) {
        const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
        const marker = L.circleMarker([spot.lat, spot.lon], {
          radius: sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast),
          fillColor: color, color: 'white', weight: 1.5, fillOpacity: 0.9,
        }).addTo(mapInstance);
        marker.bindPopup(spotPopupHtml(spot));
        markers.push(marker);
      }

      mapInstance.setView([lat, lon], 12);

      // Sidebar
      $('sidebar-header').innerHTML = `<h2>Spots Near You</h2><p>${nearby.length} spots within 30km</p>`;
      let html = '';
      for (const spot of nearby) {
        html += spotCardHtml(spot, `${spot.distance}km away`);
      }
      if (nearby.length === 0) {
        html = '<div style="padding:20px;text-align:center;color:var(--gray-400)">No sakura spots within 30km. Are you in Japan?</div>';
      }
      $('sidebar-content').innerHTML = html;
    } catch (e) {
      $('sidebar-content').innerHTML = `<div class="loading" style="color:#dc2626">${e.message}</div>`;
    }
  }, (err) => {
    $('btn-nearme').textContent = 'Near Me';
    alert('Could not get your location. Make sure location access is enabled.');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// ── Shared spot popup/card HTML builders ──

function spotPopupHtml(spot) {
  const displayName = spot.nameRomaji ? `${spot.name} <span style="color:#888">${spot.nameRomaji}</span>` : spot.name;
  const liveStatus = spotStatusWithDate(spot.bloomRate, spot.fullRate, spot.fullBloomForecast) || spot.status;
  const isEnded = liveStatus.includes('Ended') || liveStatus.includes('Falling') || liveStatus.includes('Past peak') || liveStatus.includes('green');

  // Full-width bar for popup (not the sidebar CSS class which is too narrow)
  let barsHtml = '';
  if (!isEnded) {
    const rate = spot.fullRate > 0 ? spot.fullRate : spot.bloomRate;
    const label = spot.fullRate > 0 ? 'Flowering' : 'Growth';
    const grad = spot.fullRate > 0 ? 'linear-gradient(90deg,#f9a8d4,#be185d)' : 'linear-gradient(90deg,#fdba74,#f97316)';
    barsHtml = `<div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px"><span>${label}</span><span>${rate}%</span></div>
      <div style="height:16px;background:#f0f0f0;border-radius:8px;overflow:hidden">
        <div style="width:${Math.min(rate,100)}%;height:100%;background:${grad};border-radius:8px"></div>
      </div>
    </div>`;
  }

  const statusColor = isEnded ? '#4ade80' : '#be185d';
  return `<div style="min-width:220px">
    <b>${displayName}</b>
    ${barsHtml}
    <div style="margin:4px 0"><b style="color:${statusColor}">${liveStatus}</b></div>
    <span style="font-size:11px;color:#888">${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}</span><br>
    <div style="margin-top:4px">
      <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" style="color:#ec4899;font-size:12px">Google Maps</a>
    </div>
  </div>`;
}

function spotCardHtml(spot, extra) {
  return `<div class="spot-item" onclick="flyToSpot(${spot.lat},${spot.lon},'${spot.name.replace(/'/g,"\\'")}',${spot.bloomRate},${spot.fullRate},'${spot.status.replace(/'/g,"\\'")}')">
    <h4>${spot.name} ${spot.nameRomaji ? '<span style="font-weight:400;color:var(--gray-600)">'+spot.nameRomaji+'</span>' : ''}</h4>
    ${bloomBar(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)}
    <div class="sub" style="margin-top:4px">
      ${extra ? extra + ' &middot; ' : ''}${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}
      &middot; <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" onclick="event.stopPropagation()" style="color:#ec4899">Maps</a>
    </div>
  </div>`;
}

// ── Weather card ──
async function loadWeatherCard(cityName) {
  try {
    const data = await api(`/api/weather?city=${encodeURIComponent(cityName)}`);
    const weatherDiv = document.createElement('div');
    weatherDiv.className = 'spot-item';
    weatherDiv.style.background = '#f0f9ff';
    let whtml = '<h4 style="color:#0369a1">Weather Forecast</h4>';
    for (const day of data.forecasts) {
      const temp = day.temperature;
      const maxC = temp?.max?.celsius;
      const rain = day.chanceOfRain;
      const rainHigh = Math.max(
        parseInt(rain?.T06_12) || 0,
        parseInt(rain?.T12_18) || 0,
        parseInt(rain?.T18_24) || 0
      );
      const rainIcon = rainHigh >= 50 ? '🌧' : rainHigh >= 20 ? '🌦' : '☀️';
      whtml += `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:0.82rem">
        <span>${rainIcon} ${day.dateLabel} ${day.date?.slice(5)}</span>
        <span>${day.telop} ${maxC ? maxC+'°C' : ''} ${rainHigh > 0 ? '<span style="color:#0369a1">'+rainHigh+'%</span>' : ''}</span>
      </div>`;
    }
    weatherDiv.innerHTML = whtml;
    // Insert after the JMA station card
    const firstSpot = $('sidebar-content').querySelector('.spot-item:nth-child(2)');
    if (firstSpot) {
      $('sidebar-content').insertBefore(weatherDiv, firstSpot);
    } else {
      $('sidebar-content').appendChild(weatherDiv);
    }
  } catch {} // Weather is optional — don't break the page
}

// ── Load all 1,012 spots on map ──
async function loadAllSpotsOnMap() {
  try {
    if (!allSpotsData) {
      allSpotsData = await api('/api/sakura/all-spots');
    }

    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 40,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        const childMarkers = cluster.getAllChildMarkers();
        // Count spots by actual status (using date-aware logic)
        let ended = 0, peak = 0, blooming = 0, buds = 0, dormant = 0;
        childMarkers.forEach(m => {
          const br = m.options.bloomRate || 0;
          const fr = m.options.fullRate || 0;
          const fbf = m.options.fullBloomForecast;
          if (fr >= 100 && fbf) {
            const days = Math.floor((Date.now() - new Date(fbf).getTime()) / 86400000);
            if (days > 6) { ended++; return; }
            if (days >= 0) { peak++; return; }
          }
          if (fr >= 40) { blooming++; return; }
          if (fr > 0 || br >= 100) { blooming++; return; }
          if (br > 0) { buds++; return; }
          dormant++;
        });

        // Color by majority status
        const n = childMarkers.length;
        let color, textColor;
        if (ended > n * 0.5) { color = '#4ade80'; textColor = '#166534'; }        // green — mostly ended
        else if (peak > n * 0.3) { color = '#be185d'; textColor = 'white'; }       // deep pink — peak
        else if (blooming > n * 0.3) { color = '#ec4899'; textColor = 'white'; }   // pink — blooming
        else if (buds > n * 0.3) { color = '#f97316'; textColor = 'white'; }       // orange — buds
        else if (ended > 0 && blooming > 0) { color = '#f9a8d4'; textColor = '#333'; } // mixed
        else { color = '#d4d4d4'; textColor = '#333'; }                             // dormant

        const size = Math.min(38 + n * 0.4, 58);
        return L.divIcon({
          html: `<div style="background:${color};color:${textColor};width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2)">${n}</div>`,
          className: '',
          iconSize: [size, size],
        });
      }
    });

    for (const spot of allSpotsData.spots) {
      if (!spot.lat || !spot.lon) continue;
      const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const radius = sakuraRadius(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
      const marker = L.circleMarker([spot.lat, spot.lon], {
        radius, fillColor: color, color: 'white', weight: 1.5, fillOpacity: 0.9,
        bloomRate: spot.bloomRate, fullRate: spot.fullRate, fullBloomForecast: spot.fullBloomForecast,
      });
      marker.bindPopup(spotPopupHtml(spot));
      clusterGroup.addLayer(marker);
    }
    mapInstance.addLayer(clusterGroup);

    // Also load Kawazu cherry spots with distinct markers (★ star, magenta)
    try {
      const kawazu = await api('/api/kawazu');
      for (const spot of kawazu.spots || []) {
        if (!spot.lat || !spot.lon) continue;
        const kEnded = spotStatusWithDate(spot.bloomRate, spot.fullRate, spot.fullBloomForecast)?.includes('Ended');
        const kawazuColor = kEnded ? '#4ade80' : '#db2777';
        const m = L.marker([spot.lat, spot.lon], {
          icon: L.divIcon({
            html: `<div style="background:${kawazuColor};color:white;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.2)" title="Kawazu Cherry">★</div>`,
            className: '', iconSize: [22, 22], iconAnchor: [11, 11],
          })
        }).addTo(mapInstance);
        const kStatus = spotStatusWithDate(spot.bloomRate, spot.fullRate, spot.fullBloomForecast) || 'Kawazu Cherry';
        m.bindPopup(
          `<div style="min-width:200px"><b>${spot.name}</b> ${spot.nameRomaji || ''}<br>` +
          `<em style="color:#db2777">Kawazu Cherry (河津桜)</em><br>` +
          `<b>${kStatus}</b><br>` +
          `<span style="font-size:11px;color:#888">${fmtDates(spot.bloomForecast, spot.bloomRate, spot.fullBloomForecast, spot.fullRate)}</span><br>` +
          `<a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lon}" target="_blank" style="color:#ec4899;font-size:12px">Google Maps</a></div>`
        );
        markers.push(m);
      }
    } catch {} // Kawazu is bonus — don't break main view

  } catch (e) {
    // Fallback to city markers if all-spots fails
    for (const region of (sakuraData?.regions || [])) {
      for (const city of region.cities) {
        const coords = CITY_COORDS[city.cityName];
        if (!coords) continue;
        const color = statusToColor(city.status);
        const radius = statusToRadius(city.status);
        const marker = L.circleMarker(coords, {
          radius, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.9,
        }).addTo(mapInstance);
        marker.bindPopup(`<div style="min-width:180px"><b>${city.cityName}</b> (${city.prefName})<br><b>${city.status}</b><br><span style="font-size:11px;color:#888">Bloom: ${fmtDate(city.bloom?.forecast)} · Full: ${fmtDate(city.fullBloom?.forecast)}</span></div>`);
        marker.on('click', () => loadPrefSpots(city.prefCode, city.prefName));
        markers.push(marker);
      }
    }
  }
}

// ── Fuzzy search/filter ──
function fuzzyMatch(text, query) {
  if (text.includes(query)) return true;
  let ti = 0;
  for (let qi = 0; qi < query.length; qi++) {
    const found = text.indexOf(query[qi], ti);
    if (found === -1) return false;
    ti = found + 1;
  }
  return true;
}

let searchTimeout = null;
function filterSidebar(query) {
  const q = query.toLowerCase().replace(/[\s\-]/g, '');

  // If empty, restore the current view
  if (!q) {
    document.querySelectorAll('.spot-item').forEach(el => el.style.display = '');
    return;
  }

  // If we have all spots loaded and query is 3+ chars, do a global search
  if (allSpotsData && q.length >= 3) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => globalSpotSearch(q), 300);
    return;
  }

  // Otherwise filter what's visible in sidebar
  document.querySelectorAll('.spot-item').forEach(el => {
    const text = el.textContent.toLowerCase().replace(/[\s\-]/g, '');
    el.style.display = fuzzyMatch(text, q) ? '' : 'none';
  });
}

function globalSpotSearch(q) {
  const matches = allSpotsData.spots.filter(spot => {
    const text = `${spot.name} ${spot.nameRomaji || ''} ${spot.nameReading || ''} ${spot.prefecture || ''}`.toLowerCase().replace(/[\s\-]/g, '');
    return fuzzyMatch(text, q);
  }).slice(0, 50); // limit to 50 results

  if (matches.length === 0) {
    // Fall back to sidebar filter
    document.querySelectorAll('.spot-item').forEach(el => {
      const text = el.textContent.toLowerCase().replace(/[\s\-]/g, '');
      el.style.display = fuzzyMatch(text, q) ? '' : 'none';
    });
    return;
  }

  // Show results in sidebar
  $('sidebar-header').innerHTML = `<h2>Search: "${q}"</h2><p>${matches.length} spots found${matches.length>=50?' (showing first 50)':''}</p>`;
  let html = '';
  for (const spot of matches) {
    html += spotCardHtml(spot, spot.prefecture || '');
  }
  $('sidebar-content').innerHTML = html;

  // Highlight on map
  clearMarkers();
  const bounds = [];
  for (const spot of matches) {
    if (!spot.lat || !spot.lon) continue;
    const color = sakuraColor(spot.bloomRate, spot.fullRate, spot.fullBloomForecast);
    const marker = L.circleMarker([spot.lat, spot.lon], {
      radius: 8, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.9,
    }).addTo(mapInstance);
    marker.bindPopup(spotPopupHtml(spot));
    markers.push(marker);
    bounds.push([spot.lat, spot.lon]);
  }
  if (bounds.length) mapInstance.fitBounds(bounds, { padding: [30, 30] });
}

// ── Init ──
const today = new Date().toISOString().slice(0,10);
const nextWeek = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
$('date-start').value = today;
$('date-end').value = nextWeek;
initMap();
loadSakura();
</script>
